repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: debug-statements
      - id: end-of-file-fixer
        exclude_types:
          - diff
      - id: trailing-whitespace
        exclude_types:
          - diff
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: 51905ea0435df7e0b1dacf8108081e6a14b620bd # frozen: v2.16.2
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 0839f92796ae388643a08a21640a029b322be5c2 # frozen: v0.15.2
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: a66e98df7b4aeeb3724184b332785976d062b92e # frozen: v1.19.1
    hooks:
      - id: mypy
        pass_filenames: false
        args: [src, tests]
        additional_dependencies:
          - click>=8.1
          - jsonschema>=4.26
          - openai>=2.31
          - pydantic>=2
          - pytest
          - types-jsonschema>=4.26.0.20260408
